version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  security-audit:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - run:
          name: Frontend security audit
          command: cd frontend && npm ci && npm audit --audit-level=high

  backend-build-test:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-gradle-{{ checksum "backend/build.gradle.kts" }}
      - run:
          name: Grant execute permission
          command: chmod +x backend/gradlew
      - run:
          name: Build and test backend
          command: cd backend && ./gradlew test --no-daemon
      - save_cache:
          paths:
            - ~/.gradle/caches
          key: v1-gradle-{{ checksum "backend/build.gradle.kts" }}
      - store_test_results:
          path: backend/build/test-results

  frontend-build-test:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-frontend-{{ checksum "frontend/package-lock.json" }}
      - run:
          name: Install dependencies
          command: cd frontend && npm ci
      - save_cache:
          paths:
            - frontend/node_modules
          key: v1-frontend-{{ checksum "frontend/package-lock.json" }}
      - run:
          name: Run unit tests
          command: cd frontend && npm test
      - run:
          name: Build
          command: cd frontend && npm run build

  deploy-vercel:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - run:
          name: Deploy frontend to Vercel
          command: |
            cd frontend
            npm install -g vercel@latest
            vercel pull --yes --environment=production --token=$VERCEL_TOKEN
            vercel build --prod --token=$VERCEL_TOKEN
            vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

workflows:
  ci-cd:
    jobs:
      - security-audit
      - backend-build-test
      - frontend-build-test
      - deploy-vercel:
          requires:
            - security-audit
            - frontend-build-test
          filters:
            branches:
              only: main
